- build_parts:
  - note_model_from_yaml_part: { part_id: kpss_model, file: src/note_models/kpss.yaml }

  - headers_from_yaml_part:
      - part_id: header_master
        file: src/headers/kpss_default.yaml
        override: { name: "KamuSinyal 2026 KPSS Tüm Dersler", crowdanki_uuid: "kpss-master-v8", deck_description_html_file: "src/headers/kpss_desc.html" }
      - part_id: header_cografya
        file: src/headers/kpss_default.yaml
        override: { name: "KamuSinyal 2026 KPSS Coğrafya", crowdanki_uuid: "kpss-cografya-v8", deck_description_html_file: "src/headers/kpss_desc.html" }

  - notes_from_csvs:
      part_id: cografya_notes
      note_model_mappings: [{ note_models: [kpss_model], columns_to_fields: { guid: guid, tags: tags, Question: Question, Answer: Answer } }]
      file_mappings: [{ file: src/data/cografya.csv, note_model: kpss_model }]

  - notes_from_csvs:
      part_id: master_notes
      note_model_mappings: [{ note_models: [kpss_model], columns_to_fields: { guid: guid, tags: tags, Question: Question, Answer: Answer } }]
      file_mappings:
        - { file: src/data/cografya.csv, note_model: kpss_model }

- generate_crowd_anki: { folder: "build/KamuSinyal 2026 KPSS Tüm Dersler", headers: header_master, note_models: { parts: [{ part_id: kpss_model }] }, notes: { part_id: master_notes } }
- generate_crowd_anki: { folder: "build/KamuSinyal 2026 KPSS Coğrafya", headers: header_cografya, note_models: { parts: [{ part_id: kpss_model }] }, notes: { part_id: cografya_notes } }
